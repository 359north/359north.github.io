<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tutorial</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; background: #f6f6f6; color: #1c1c1e; }
.tutorial { position: relative; display: inline-block; max-width: 100%; }
.tutorial img { display: block; max-width: 100%; height: auto; }
.hotspot { position: absolute; border: 3px solid transparent; border-radius: 6px; box-sizing: border-box; cursor: pointer; transition: background-color 0.15s, border-color 0.15s; }
.hotspot:hover { border-color: #34c759; background-color: rgba(52,199,89,0.18); }
.hotspot.active { background-color: rgba(52,199,89,0.18); }
.caption { margin-top: 14px; min-height: 3em; font-size: 14pt; line-height: 1.4; max-width: 720px; }
.caption .title { font-weight: 600; }
</style>
</head>
<body>
	<h1>The Main GPX-V Document Window</h1>
	<p>This is where you import video and gpx files, synchronize them, and adjust as needed.<p>
	<p>Move your pointer over the images below to see feature explanations.</p>
<div class="tutorial" id="tutorial">
<img src="screenshot.png" alt="Tutorial screenshot">
<div class="hotspot" data-index="0" data-title="The GPX-V Document Window" data-explanation="displays video, map, elevation chart, trackpoint table, and document contents." style="left:0.0000%; top:0.0000%; width:100.0000%; height:100.0000%;" title="The GPX-V Document Window"></div>
<div class="hotspot" data-index="1" data-title="The Video Editor" data-explanation="plays and edits video." style="left:0.2333%; top:0.4500%; width:47.4802%; height:52.2952%;" title="The Video Editor"></div>
<div class="hotspot" data-index="2" data-title="The Video Filter Display" data-explanation="shows the application of video filters to the video. Click a filter to edit." style="left:4.5964%; top:50.9451%; width:38.7541%; height:1.0801%;" title="The Video Filter Display"></div>
<div class="hotspot" data-index="3" data-title="Selected Video Frames" data-explanation="shows 1, 2, or 3 frames depending on how long the video selection is. First, middle, and last frames of the selection." style="left:21.3719%; top:42.6643%; width:5.2263%; height:7.2007%;" title="Selected Video Frames"></div>
<div class="hotspot" data-index="4" data-title="The Selection Range Slider" data-explanation="can change the selected video and trackpoints. Slide, click or shift-click to change the selection." style="left:4.5964%; top:42.6643%; width:38.7541%; height:1.8002%;" title="The Selection Range Slider"></div>
<div class="hotspot" data-index="5" data-title="The Route Map" data-explanation="displays your route." style="left:48.1801%; top:0.4500%; width:51.5866%; height:42.2142%;" title="The Route Map"></div>
<div class="hotspot" data-index="6" data-title="The Elevation Chart" data-explanation="shows how your route changes elevation. Colors signal the gradient of the slope. Click to select a point along the route. Shift-click to select a range from the current selected point." style="left:48.1801%; top:42.6643%; width:51.5866%; height:10.0810%;" title="The Elevation Chart"></div>
<div class="hotspot" data-index="7" data-title="The Map Type Control" data-explanation="switches between traffic and satellite views." style="left:94.4004%; top:1.8002%; width:3.0331%; height:2.1602%;" title="The Map Type Control"></div>
<div class="hotspot" data-index="8" data-title="The Speed Change Control" data-explanation="shows any changes in speed that have been applied to the route. Click a filter to edit." style="left:48.6468%; top:50.9451%; width:50.6533%; height:1.0801%;" title="The Speed Change Control"></div>
<div class="hotspot" data-index="9" data-title="The Trackpoint Table" data-explanation="lists the GPS trackpoints in order. Click a row to select the point, shift-click to select a range. Arrow keys work too. " style="left:44.7037%; top:53.7354%; width:54.2231%; height:40.2340%;" title="The Trackpoint Table"></div>
<div class="hotspot" data-index="10" data-title="The Information View" data-explanation="shows information about the history of changes to your document, an analysis of any potential problems, and the current status of your document." style="left:0.2333%; top:53.6454%; width:43.9571%; height:41.9442%;" title="The Information View"></div>
<div class="hotspot" data-index="11" data-title="The Information Option Control" data-explanation="displays the three classes of available information. Click to select the one you want to see." style="left:0.2333%; top:53.6454%; width:43.9571%; height:2.1602%;" title="The Information Option Control"></div>
<div class="hotspot" data-index="12" data-title="The Action Buttons" data-explanation="perform available actions. Grouped by video, video and GPS, and GPS." style="left:0.2333%; top:95.5896%; width:99.5334%; height:3.9604%;" title="The Action Buttons"></div>
<div class="hotspot" data-index="13" data-title="The Import Video Button" data-explanation="imports one or more .mp4 video files" style="left:29.6080%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Import Video Button"></div>
<div class="hotspot" data-index="14" data-title="The Remove Audio Button" data-explanation="deletes audio tracks" style="left:31.6612%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Remove Audio Button"></div>
<div class="hotspot" data-index="15" data-title="The Trim From Start Button" data-explanation="trims from the start of the video until the first selected trackpoint" style="left:33.7144%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Trim From Start Button"></div>
<div class="hotspot" data-index="16" data-title="The Trim Until End Button" data-explanation="trims from the last selected trackpoint until the end of the video" style="left:35.7676%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Trim Until End Button"></div>
<div class="hotspot" data-index="17" data-title="The Video Filter Button" data-explanation="opens an editor to apply image filters to the selected video to compensate for shadows, glare, etc." style="left:37.8208%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Video Filter Button"></div>
<div class="hotspot" data-index="18" data-title="The Titles Button" data-explanation="opens an editor to add text to the video for a selected segment" style="left:39.8740%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Titles Button"></div>
<div class="hotspot" data-index="19" data-title="The Share Video Button" data-explanation="shares a frame or clip" style="left:41.9272%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Share Video Button"></div>
<div class="hotspot" data-index="20" data-title="The Export Video Button" data-explanation="exports a syncrhonized .mp4 file" style="left:43.9804%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Export Video Button"></div>
<div class="hotspot" data-index="21" data-title="The Speed Adjustment Button" data-explanation="opens an editor to apply speed adjustments to video and GPX simultaneously." style="left:47.6202%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Speed Adjustment Button"></div>
<div class="hotspot" data-index="22" data-title="The Segment Delete Button" data-explanation="deletes selected trackpoints and video" style="left:49.6734%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Segment Delete Button"></div>
<div class="hotspot" data-index="23" data-title="The Import GPX Button" data-explanation="imports a GPX file" style="left:53.3131%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Import GPX Button"></div>
<div class="hotspot" data-index="24" data-title="The Add Trackpoint Button" data-explanation="adds a trackpoint at the  location on the map at the time specified in video" style="left:55.3663%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Add Trackpoint Button"></div>
<div class="hotspot" data-index="25" data-title="The Delete Trackpoints Button" data-explanation="deletes the selected trackpoints" style="left:57.4195%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Delete Trackpoints Button"></div>
<div class="hotspot" data-index="26" data-title="The Trackpoint Edit Button" data-explanation="Edits the selected trackpoints" style="left:59.4727%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Trackpoint Edit Button"></div>
<div class="hotspot" data-index="27" data-title="The Route Interpolation Button" data-explanation="interpolates a route between two selected points" style="left:61.5259%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Route Interpolation Button"></div>
<div class="hotspot" data-index="28" data-title="The Elevation Button" data-explanation="Adjusts elevations and gradients" style="left:63.5791%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Elevation Button"></div>
<div class="hotspot" data-index="29" data-title="The Export GPX Button" data-explanation="exports a synchronized GPX file" style="left:65.6323%; top:95.9496%; width:1.5866%; height:3.2403%;" title="The Export GPX Button"></div>
<div class="hotspot" data-index="30" data-title="_NS:179" data-explanation="" style="left:67.6855%; top:96.4896%; width:2.7298%; height:2.1602%;" title="_NS:179"></div>
</div>
<div class="caption"><span class="title" id="capTitle"></span> <span id="capExplanation"></span></div>
<script>
(function(){
  var hs = document.querySelectorAll('.hotspot');
  var ct = document.getElementById('capTitle');
  var ce = document.getElementById('capExplanation');
  var active = null;
  function show(h){ if (active) active.classList.remove('active'); active = h; if (h) h.classList.add('active'); ct.textContent = h ? h.getAttribute('data-title') : ''; ce.textContent = h ? h.getAttribute('data-explanation') : ''; }
  hs.forEach(function(h){ h.addEventListener('mouseenter', function(){ show(h); }); h.addEventListener('click', function(){ show(h); }); });
  if (hs.length > 0) show(hs[0]);
})();
</script>
</body>
</html>
