<h1>The GPX-V Library</h1>
<p>The Library helps you keep track of all your GPX-V projects.</p>
<p>Many users keep their videos on external drives, and the Library can help you find them.</p>

<div class="caption"><span class="title" id="capTitle"></span> <span id="capExplanation"></span></div>
<script>
(function(){
  var hs = document.querySelectorAll('.hotspot');
  var ct = document.getElementById('capTitle');
  var ce = document.getElementById('capExplanation');
  var active = null;
  function show(h){ if (active) active.classList.remove('active'); active = h; if (h) h.classList.add('active'); ct.textContent = h ? h.getAttribute('data-title') : ''; ce.textContent = h ? h.getAttribute('data-explanation') : ''; }
  hs.forEach(function(h){ h.addEventListener('mouseenter', function(){ show(h); }); h.addEventListener('click', function(){ show(h); }); });
  var initial = null;
  if (location.hash && location.hash.length > 1) { initial = document.getElementById(location.hash.substring(1)); if (initial && !initial.classList.contains('hotspot')) initial = null; }
  if (!initial && hs.length > 0) initial = hs[0];
  if (initial) show(initial);
})();
</script>
