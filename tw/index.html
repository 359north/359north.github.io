					<h4>還剩多少日光？</h4>

					<p>我寫這個應用程式是為了在騎自行車時能在天黑前回家。一眼就能看到距離日落還有多少時間，並設定通知提前提醒您。您的親人將不再擔心或抱怨。</p>
					<p>然後我添加了所有太陽相關功能，純粹為了樂趣。您可以監控地球上任何地方的日出、正午和日落。您可以比較地點、製作影片，並生成報告將您選擇的地點與全球各地進行比較。</p>
